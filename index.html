  <style>
    /* ============================================================
       ORKESTA — Diseño v2
       Papel cálido · tinta · una señal verde
       ============================================================ */

    :root {
      --paper:      #ECE6D7;
      --paper-2:    #F4EFE3;
      --paper-3:    #E1DAC6;
      --ink:        #1A1712;
      --ink-70:     rgba(26,23,18,0.66);
      --ink-45:     rgba(26,23,18,0.44);
      --ink-25:     rgba(26,23,18,0.22);
      --line:       rgba(26,23,18,0.16);
      --green:      #1F5A3A;
      --green-deep: #143E27;
      --green-tint: #DCE6DA;
      --wa:         #25D366;
      --serif: 'Newsreader', Georgia, serif;
      --sans:  'Archivo', system-ui, sans-serif;
      --mono:  'IBM Plex Mono', ui-monospace, monospace;
      --maxw: 1180px;
      --gut: 56px;
      --nav-h: 67px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    ::selection { background: var(--green); color: var(--paper-2); }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: var(--sans);
      font-size: 16px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    a { color: inherit; text-decoration: none; }
    img, svg { display: block; }

    /* ---- Layout ---- */
    .wrap {
      max-width: var(--maxw);
      margin: 0 auto;
      padding: 0 var(--gut);
    }
    .section { padding: 80px 0; }

    /* ---- Buttons ---- */
    .btn {
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.01em;
      padding: 13px 24px;
      border: 1.5px solid var(--ink);
      background: var(--paper);
      color: var(--ink);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 9px;
      transition: transform .12s, box-shadow .12s;
      text-decoration: none;
    }
    .btn:hover { transform: translate(-2px, -2px); box-shadow: 4px 4px 0 var(--ink); }
    .btn:active { transform: none; box-shadow: none; }
    .btn-primary { background: var(--ink); color: var(--paper-2); }
    .btn-green { background: var(--green); color: var(--paper-2); border-color: var(--green-deep); }
    .btn-green:hover { box-shadow: 4px 4px 0 var(--green-deep); }
    .btn-ghost { border-color: transparent; background: transparent; }
    .btn-ghost:hover { transform: none; box-shadow: none; text-decoration: underline; text-underline-offset: 4px; }

    /* ---- Badges ---- */
    .badge {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 5px 11px;
      border: 1px solid var(--ink);
      background: var(--paper-2);
      display: inline-flex;
      align-items: center;
      gap: 7px;
      white-space: nowrap;
    }
    .badge-green { border-color: var(--green); color: var(--green-deep); background: var(--green-tint); }
    .badge-ink { background: var(--ink); color: var(--paper-2); border-color: var(--ink); }

    /* ---- Section header (shared) ---- */
    .sec-hdr {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 24px;
      align-items: start;
      margin-bottom: 52px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--ink);
    }
    .sec-num {
      font-family: var(--sans);
      font-weight: 800;
      font-size: 64px;
      line-height: 0.85;
      letter-spacing: -0.04em;
      color: var(--ink);
    }
    .sec-kicker {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--green);
      margin-bottom: 12px;
    }
    .sec-title {
      font-family: var(--serif);
      font-size: clamp(26px, 3.5vw, 38px);
      font-weight: 500;
      line-height: 1.06;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }
    .sec-title em { font-style: italic; }
    .sec-desc {
      font-size: 15px;
      line-height: 1.6;
      color: var(--ink-70);
      max-width: 560px;
    }

    /* ---- Nav ---- */
    .nav-bar {
      position: sticky;
      top: 0;
      z-index: 50;
      background: var(--paper);
      border-bottom: 1px solid var(--ink);
    }
    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px var(--gut);
    }
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
    }
    .nav-wordmark {
      font-family: var(--serif);
      font-size: 22px;
      font-weight: 500;
      letter-spacing: -0.02em;
      color: var(--ink);
    }
    .nav-links {
      display: flex;
      align-items: center;
      gap: 28px;
    }
    .nav-link {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-70);
      text-decoration: none;
      transition: color .15s;
    }
    .nav-link:hover { color: var(--ink); }
    .nav-cta { font-size: 13px; padding: 10px 20px; }

    /* ---- Language toggle ---- */
    .lang-toggle {
      display: flex;
      align-items: center;
      gap: 2px;
    }
    .lang-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 4px;
      color: var(--ink-45);
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: color .15s;
      line-height: 1;
    }
    .lang-btn.active { color: var(--ink); font-weight: 700; }
    .lang-btn:hover { color: var(--ink); }
    .lang-sep { color: var(--ink-25); font-family: var(--mono); font-size: 11px; line-height: 1; }

    .nav-toggle {
      display: none;
      background: none;
      border: 1.5px solid var(--ink);
      padding: 8px 10px;
      cursor: pointer;
      flex-direction: column;
      gap: 5px;
    }
    .nav-toggle span {
      display: block;
      width: 20px;
      height: 1.5px;
      background: var(--ink);
    }
    .nav-mobile {
      border-top: 1px solid var(--line);
      padding: 16px var(--gut);
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .nav-mobile a {
      display: block;
      padding: 10px 0;
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--ink-70);
      border-bottom: 1px solid var(--line);
    }
    .nav-mobile a:last-child { border-bottom: none; }
    .nav-mobile-lang {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 0;
      border-bottom: 1px solid var(--line);
    }

    /* ---- Hero ---- */
    .hero {
      min-height: calc(100dvh - var(--nav-h));
      display: flex;
      align-items: center;
      padding: 80px 0;
      text-align: center;
      border-bottom: 1px solid var(--ink);
    }
    .hero .wrap { width: 100%; }
    .hero-kicker {
      display: inline-flex;
      margin-bottom: 28px;
    }
    .hero-headline {
      font-family: var(--serif);
      font-size: clamp(40px, 6vw, 72px);
      font-weight: 400;
      line-height: 1.04;
      letter-spacing: -0.025em;
      max-width: 820px;
      margin: 0 auto;
    }
    .hero-headline em { font-style: italic; }
    .hero-sub {
      font-size: 17px;
      line-height: 1.65;
      color: var(--ink-70);
      max-width: 600px;
      margin: 24px auto 0;
    }
    .hero-sub b { color: var(--ink); font-weight: 600; }
    .hero-ctas {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-top: 36px;
    }
    .hero-trust {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin-top: 32px;
    }

    /* ---- Servicios ---- */
    .svc-grid {
      border: 1px solid var(--ink);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
    }
    .svc-card {
      padding: 30px 26px 32px;
      border-right: 1px solid var(--ink);
      border-bottom: 1px solid var(--ink);
      background: var(--paper-2);
      transition: background .15s;
    }
    .svc-card:nth-child(3n) { border-right: none; }
    .svc-card:nth-last-child(-n+3) { border-bottom: none; }
    .svc-card:hover { background: var(--paper); }
    .svc-ico {
      width: 46px;
      height: 46px;
      border: 1.5px solid var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      flex-shrink: 0;
      color: var(--ink);
      transition: background .15s, border-color .15s, color .15s;
    }
    .svc-card:hover .svc-ico {
      background: var(--green);
      border-color: var(--green-deep);
      color: var(--paper-2);
    }
    .svc-title {
      font-weight: 700;
      font-size: 16px;
      letter-spacing: -0.01em;
      margin-bottom: 8px;
    }
    .svc-desc {
      font-size: 13.5px;
      line-height: 1.6;
      color: var(--ink-70);
    }

    /* ---- Proceso ---- */
    .proceso-grid {
      border: 1px solid var(--ink);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
    }
    .proceso-card {
      padding: 28px 26px 30px;
      border-right: 1px solid var(--ink);
      border-bottom: 1px solid var(--ink);
      background: var(--paper-2);
    }
    .proceso-card:nth-child(3n) { border-right: none; }
    .proceso-card:nth-last-child(-n+3) { border-bottom: none; }
    .proceso-n {
      font-family: var(--mono);
      font-size: 36px;
      font-weight: 600;
      letter-spacing: -0.04em;
      color: var(--ink-25);
      line-height: 1;
      margin-bottom: 16px;
    }
    .proceso-title {
      font-weight: 700;
      font-size: 15px;
      margin-bottom: 8px;
    }
    .proceso-desc {
      font-size: 13px;
      line-height: 1.6;
      color: var(--ink-70);
    }

    /* ---- Soluciones ---- */
    .soluciones-wrap {
      border: 1px solid var(--ink);
      background: var(--paper-2);
      padding: 48px var(--gut);
    }
    .soluciones-hdr {
      margin-bottom: 40px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--ink);
    }
    .soluciones-hdr .sec-title { margin-bottom: 10px; }
    .soluciones-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border: 1px solid var(--ink);
    }
    .sol-card {
      padding: 28px 26px 30px;
      border-right: 1px solid var(--ink);
      border-bottom: 1px solid var(--ink);
      background: var(--paper);
      transition: background .15s;
    }
    .sol-card:nth-child(2n) { border-right: none; }
    .sol-card:nth-last-child(-n+2) { border-bottom: none; }
    .sol-card:hover { background: var(--paper-2); }
    .sol-title { font-weight: 700; font-size: 16px; letter-spacing: -0.01em; margin-bottom: 8px; }
    .sol-desc { font-size: 13.5px; line-height: 1.6; color: var(--ink-70); margin-bottom: 16px; }
    .sol-tags { display: flex; flex-wrap: wrap; gap: 6px; }

    /* ---- Precios ---- */
    .precios-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      border: 1px solid var(--ink);
    }
    .precio-card {
      padding: 32px 28px 36px;
      border-right: 1px solid var(--ink);
      background: var(--paper-2);
      display: flex;
      flex-direction: column;
    }
    .precio-card:last-child { border-right: none; }
    .precio-card--dest {
      background: var(--paper);
      border-left: 3px solid var(--green);
      border-right: 1px solid var(--ink);
    }
    .precio-rec {
      margin-bottom: 16px;
    }
    .precio-title {
      font-weight: 700;
      font-size: 17px;
      letter-spacing: -0.01em;
      margin-bottom: 6px;
    }
    .precio-d {
      font-size: 13px;
      color: var(--ink-70);
      line-height: 1.5;
      margin-bottom: 20px;
    }
    .precio-price {
      font-family: var(--serif);
      font-size: 28px;
      font-weight: 400;
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }
    .precio-unit {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--ink-45);
      margin-bottom: 22px;
    }
    .precio-items {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 28px;
      flex: 1;
    }
    .precio-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 13.5px;
      line-height: 1.5;
      color: var(--ink-70);
    }
    .precio-item-ico {
      flex-shrink: 0;
      margin-top: 2px;
      color: var(--green);
      width: 16px;
      height: 16px;
    }

    /* ---- Contacto ---- */
    .contacto-wrap {
      border: 1px solid var(--ink);
      display: grid;
      grid-template-columns: 1fr 1fr;
    }
    .contacto-left {
      padding: 48px 40px;
      border-right: 1px solid var(--ink);
      background: var(--paper-2);
    }
    .contacto-right {
      padding: 48px 40px;
      background: var(--paper);
    }
    .contacto-title {
      font-family: var(--serif);
      font-size: clamp(26px, 3vw, 36px);
      font-weight: 500;
      line-height: 1.06;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }
    .contacto-title em { font-style: italic; }
    .contacto-sub {
      font-size: 15px;
      line-height: 1.6;
      color: var(--ink-70);
      margin-bottom: 32px;
    }
    .contact-links { display: flex; flex-direction: column; gap: 10px; }
    .contact-link {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 18px;
      border: 1.5px solid var(--ink);
      background: var(--paper);
      text-decoration: none;
      color: var(--ink);
      transition: background .15s, box-shadow .12s, transform .12s;
    }
    .contact-link:hover { background: var(--paper-2); transform: translate(-2px, -2px); box-shadow: 3px 3px 0 var(--ink); }
    .contact-link-ico {
      width: 36px;
      height: 36px;
      border: 1.5px solid var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--ink);
    }
    .contact-link-title { font-weight: 600; font-size: 14px; margin-bottom: 3px; }
    .contact-link-sub { font-family: var(--mono); font-size: 11px; letter-spacing: 0.04em; text-transform: uppercase; color: var(--ink-45); }

    /* Form */
    .form-field { margin-bottom: 14px; }
    .field-label {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-70);
      display: block;
      margin-bottom: 7px;
    }
    .field {
      width: 100%;
      background: var(--paper-2);
      border: 1.5px solid var(--ink);
      padding: 12px 14px;
      font-family: var(--sans);
      font-size: 15px;
      color: var(--ink);
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .field::placeholder { color: var(--ink-45); }
    .field:focus { border-color: var(--green); box-shadow: 3px 3px 0 var(--green); }
    textarea.field { resize: none; }
    .form-submit { margin-top: 18px; width: 100%; justify-content: center; font-size: 15px; padding: 15px 24px; }

    /* Success state */
    .form-success {
      border: 1.5px solid var(--green);
      background: var(--green-tint);
      padding: 48px 32px;
      text-align: center;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }
    .form-success-ico { color: var(--green); }
    .form-success h3 {
      font-family: var(--serif);
      font-size: 26px;
      font-weight: 500;
    }

    .floating-wa {

      box-shadow: 3px 3px 0 rgba(0,0,0,.25);
      text-decoration: none;
      transition: transform .12s, box-shadow .12s;

      .proceso-card:nth-child(2n) { border-right: none; }

      .proceso-card:nth-last-child(-n+2) { border-bottom: none; }

            { t: "Back-Office Orchestrator",          d: "Automate client onboarding, notifications and recurring reports between your apps.",                                    tags: ["Integrations", "n8n"] },
          ],
        },
        precios: {
          kicker: "Pricing · Models",
          h2: "Every proposal is <em>tailored</em>.",
          desc: "Start with a diagnosis session to understand your case and design the best solution.",
          footerText: "Ready to start? The first session is the starting point to design your solution.",
          footerLink: "WhatsApp →",
          recommended: "Recommended",
          planes: [
            {
              t: "Initial Diagnosis", precio: "$500", unidad: "session up to 1 hour",
              d: "We get to know your business and identify opportunities.",
              items: ["Understand your processes", "Identify what to automate first", "Impact estimation", "Clear next steps"],
              cta: "Book a call",
            },
            {
              t: "Design & Implementation", precio: "Custom", unidad: "based on project scope", destacado: true,
              d: "We build the solution end to end.",
              items: ["Discovery and solution design", "Implementation and testing", "Best practices checklist", "Production launch and handoff"],
              cta: "Request a proposal",
            },
            {
              t: "Ongoing Support", precio: "Custom plan", unidad: "monthly retainer",
              d: "We improve and scale what already works.",
              items: ["Monitoring and maintenance", "Adjustments and improvements", "New automations", "Priority support"],
              cta: "Let's talk",
            },
          ],
        },
        contacto: {
          kicker: "Contact · Schedule",
          h2: "Let's talk about <em>your business</em>.",
          desc: "Tell us your case. We'll identify what to automate first and how we can help you.",
          waTitle: "Direct WhatsApp",
          waSub: "Fast response",
          emailSub: "Email",
          form: {
            nombre: "Name", nombrePh: "Your name",
            correo: "Email", correoPh: "you@company.com",
            empresa: "Company (optional)", empresaPh: "Your company name",
            mensaje: "What process takes up most of your time?", mensajePh: "E.g.: manual invoices, customer support, reports...",
            submit: "Send message",
            successH: "Message ready!",
            successP: "Your message is on its way. I'll get back to you soon.",
          },
        },
        footer: { copy: `© ${new Date().getFullYear()} Orkesta · Automation & AI · Mexico` },
      },
    };

    /* ============================================================
       DETECCIÓN DE IDIOMA
       Orden: ?lang= → localStorage → navigator.language → es
       ============================================================ */
    function detectLanguage() {
      const param = new URLSearchParams(window.location.search).get('lang');
      if (param === 'en' || param === 'es') return param;
      const stored = localStorage.getItem('orkesta-lang');
      if (stored === 'en' || stored === 'es') return stored;
      const browser = (navigator.language || 'es').slice(0, 2);
      return browser === 'en' ? 'en' : 'es';
    }

    const waLink = (msg) =>
      `https://wa.me/${CONFIG.whatsapp}?text=${encodeURIComponent(msg || "Hola")}`;

    const Ico = ({ id, w = 18, h = 18 }) => (
      <svg width={w} height={h} aria-hidden="true"><use href={`#${id}`}/></svg>
    );

    /* ----------------------- NAV ----------------------- */
    const Nav = ({ lang, setLanguage, t }) => {
      const [open, setOpen] = useState(false);
      return (
        <header className="nav-bar">
          <div className="nav-inner">
            <a href="#top" className="nav-logo">
              <svg width="34" height="34" style={{color:"var(--ink)"}}><use href="#mark"/></svg>
              <span className="nav-wordmark">{CONFIG.marca}</span>
            </a>
            <nav className="nav-links">
              {t.nav.links.map(([label, href]) => (
                <a key={href} href={href} className="nav-link">{label}</a>
              ))}
              <div className="lang-toggle" role="group" aria-label="Language / Idioma">
                <button className={`lang-btn${lang === 'es' ? ' active' : ''}`} onClick={() => setLanguage('es')}>ES</button>
                <span className="lang-sep" aria-hidden="true">|</span>
                <button className={`lang-btn${lang === 'en' ? ' active' : ''}`} onClick={() => setLanguage('en')}>EN</button>
              </div>
              <a href="#contacto" className="btn btn-primary nav-cta">{t.nav.cta}</a>
            </nav>
            <button onClick={() => setOpen(!open)} className="nav-toggle" aria-label="Menú">
              <span/><span/><span/>
            </button>
          </div>
          {open && (
            <div className="nav-mobile">
              {t.nav.links.map(([label, href]) => (
                <a key={href} href={href} onClick={() => setOpen(false)}>{label}</a>
              ))}
              <div className="nav-mobile-lang">
                <button className={`lang-btn${lang === 'es' ? ' active' : ''}`} onClick={() => { setLanguage('es'); setOpen(false); }}>ES</button>
                <span className="lang-sep" aria-hidden="true">|</span>
                <button className={`lang-btn${lang === 'en' ? ' active' : ''}`} onClick={() => { setLanguage('en'); setOpen(false); }}>EN</button>
              </div>
            </div>
          )}
        </header>
      );
    };

    /* ----------------------- HERO ----------------------- */
    const Hero = ({ t }) => (
      <section id="top" className="hero">
        <div className="wrap">
          <div className="hero-kicker">
            <span className="badge badge-green"><Ico id="i-check" w={13} h={13}/>{t.hero.badge}</span>
          </div>
          <h1 className="hero-headline" dangerouslySetInnerHTML={{__html: t.hero.h1}} />
          <p className="hero-sub" dangerouslySetInnerHTML={{__html: t.hero.sub}} />
          <div className="hero-ctas">
            <a href="#contacto" className="btn btn-green"><Ico id="i-cal"/>{t.hero.cta1}</a>
            <a href={waLink(t.waMsg)} target="_blank" className="btn"><Ico id="i-chat"/>{t.hero.cta2}</a>
          </div>
          <div className="hero-trust">
            {t.hero.trust.map((badge) => (
              <span key={badge} className="badge">{badge}</span>
            ))}
          </div>
        </div>
      </section>
    );

    /* ----------------------- SERVICIOS ----------------------- */
    const Servicios = ({ t }) => (
      <section id="servicios" className="section">
        <div className="wrap">
          <div className="sec-hdr">
            <div className="sec-num">01</div>
            <div>
              <div className="sec-kicker">{t.servicios.kicker}</div>
              <h2 className="sec-title" dangerouslySetInnerHTML={{__html: t.servicios.h2}} />
              <p className="sec-desc">{t.servicios.desc}</p>
            </div>
          </div>
          <div className="svc-grid">
            {t.servicios.items.map((s) => (
              <div key={s.t} className="svc-card">
                <div className="svc-ico"><Ico id={s.iconId} w={26} h={26}/></div>
                <div className="svc-title">{s.t}</div>
                <p className="svc-desc">{s.d}</p>
              </div>
            ))}
          </div>
        </div>
      </section>
    );

    /* ----------------------- PROCESO ----------------------- */
    const Proceso = ({ t }) => (
      <section id="proceso" className="section" style={{background:"var(--paper-2)"}}>
        <div className="wrap">
          <div className="sec-hdr">
            <div className="sec-num">02</div>
            <div>
              <div className="sec-kicker">{t.proceso.kicker}</div>
              <h2 className="sec-title" dangerouslySetInnerHTML={{__html: t.proceso.h2}} />
              <p className="sec-desc">{t.proceso.desc}</p>
            </div>
          </div>
          <div className="proceso-grid">
            {t.proceso.etapas.map((e) => (
              <div key={e.n} className="proceso-card">
                <div className="proceso-n">{e.n}</div>
                <div className="proceso-title">{e.t}</div>
                <p className="proceso-desc">{e.d}</p>
              </div>
            ))}
          </div>
        </div>
      </section>
    );

    /* ----------------------- SOLUCIONES ----------------------- */
    const Soluciones = ({ t }) => (
      <section id="soluciones" className="section">
        <div className="wrap">
          <div className="soluciones-wrap">
            <div className="soluciones-hdr">
              <div className="sec-kicker">{t.soluciones.kicker}</div>
              <h2 className="sec-title" dangerouslySetInnerHTML={{__html: t.soluciones.h2}} />
              <p className="sec-desc">{t.soluciones.desc}</p>
            </div>
            <div className="soluciones-grid">
              {t.soluciones.items.map((s) => (
                <div key={s.t} className="sol-card">
                  <div className="sol-title">{s.t}</div>
                  <p className="sol-desc">{s.d}</p>
                  <div className="sol-tags">
                    {s.tags.map((tag) => (
                      <span key={tag} className="badge badge-green">{tag}</span>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      </section>
    );

    /* ----------------------- PRECIOS ----------------------- */
    const Precios = ({ t }) => (
      <section id="precios" className="section" style={{background:"var(--paper-3)"}}>
        <div className="wrap">
          <div className="sec-hdr">
            <div className="sec-num">03</div>
            <div>
              <div className="sec-kicker">{t.precios.kicker}</div>
              <h2 className="sec-title" dangerouslySetInnerHTML={{__html: t.precios.h2}} />
              <p className="sec-desc">{t.precios.desc}</p>
            </div>
          </div>
          <div className="precios-grid">
            {t.precios.planes.map((p) => (
              <div key={p.t} className={`precio-card${p.destacado ? " precio-card--dest" : ""}`}>
                {p.destacado && (
                  <div className="precio-rec">
                    <span className="badge badge-green"><Ico id="i-check" w={13} h={13}/>{t.precios.recommended}</span>
                  </div>
                )}
                <div className="precio-title">{p.t}</div>
                <p className="precio-d">{p.d}</p>
                <div className="precio-price">{p.precio}</div>
                <div className="precio-unit">{p.unidad}</div>
                <ul className="precio-items">
                  {p.items.map((item) => (
                    <li key={item} className="precio-item">
                      <svg className="precio-item-ico" width="16" height="16"><use href="#i-check"/></svg>
                      {item}
                    </li>
                  ))}
                </ul>
                <a href="#contacto" className={`btn${p.destacado ? " btn-green" : " btn-primary"}`} style={{justifyContent:"center"}}>{p.cta}</a>
              </div>
            ))}
          </div>
          <p style={{marginTop:"20px", fontFamily:"var(--mono)", fontSize:"12px", letterSpacing:"0.04em", textTransform:"uppercase", color:"var(--ink-45)"}}>
            {t.precios.footerText}&nbsp;
            <a href={waLink(t.waMsg)} target="_blank" style={{color:"var(--green)", fontWeight:600}}>{t.precios.footerLink}</a>
          </p>
        </div>
      </section>
    );

    /* ----------------------- CONTACTO ----------------------- */
    const Contacto = ({ t }) => {
      const [sent, setSent] = useState(false);
      const f = t.contacto.form;

      const handle = (e) => {
        e.preventDefault();
        const fd = e.target;
        const nombre = fd.nombre.value, correo = fd.correo.value, empresa = fd.empresa.value, mensaje = fd.mensaje.value;
        if (CONFIG.formspree) {
          fetch(CONFIG.formspree, {
            method: "POST",
            headers: { "Accept": "application/json", "Content-Type": "application/json" },
            body: JSON.stringify({ nombre, correo, empresa, mensaje }),
          }).then(() => setSent(true)).catch(() => { window.location.href = mailto(nombre, correo, empresa, mensaje); });
        } else {
          window.location.href = mailto(nombre, correo, empresa, mensaje);
          setSent(true);
        }
      };

      const mailto = (n="", c="", em="", m="") =>
        `mailto:${CONFIG.email}?subject=${encodeURIComponent("Nuevo lead desde " + CONFIG.marca + " — " + (em||n))}&body=${encodeURIComponent(`Nombre: ${n}\nCorreo: ${c}\nEmpresa: ${em}\n\n${m}`)}`;

      return (
        <section id="contacto" className="section">
          <div className="wrap">
            <div className="sec-hdr">
              <div className="sec-num">04</div>
              <div>
                <div className="sec-kicker">{t.contacto.kicker}</div>
                <h2 className="sec-title" dangerouslySetInnerHTML={{__html: t.contacto.h2}} />
                <p className="sec-desc">{t.contacto.desc}</p>
              </div>
            </div>
            <div className="contacto-wrap">
              <div className="contacto-left">
                <div className="contact-links">
                  <a href={waLink(t.waMsg)} target="_blank" className="contact-link">
                    <div className="contact-link-ico"><Ico id="i-chat" w={20} h={20}/></div>
                    <div>
                      <div className="contact-link-title">{t.contacto.waTitle}</div>
                      <div className="contact-link-sub">{t.contacto.waSub}</div>
                    </div>
                  </a>
                  <a href={`mailto:${CONFIG.email}`} className="contact-link">
                    <div className="contact-link-ico"><Ico id="i-mail" w={20} h={20}/></div>
                    <div>
                      <div className="contact-link-title">{CONFIG.email}</div>
                      <div className="contact-link-sub">{t.contacto.emailSub}</div>
                    </div>
                  </a>
                </div>
              </div>
              <div className="contacto-right">
                {sent ? (
                  <div className="form-success">
                    <svg className="form-success-ico" width="40" height="40"><use href="#i-check"/></svg>
                    <h3>{f.successH}</h3>
                    <p>{f.successP}</p>
                  </div>
                ) : (
                  <form onSubmit={handle}>
                    <div className="form-field">
                      <label className="field-label">{f.nombre}</label>
                      <input name="nombre" required placeholder={f.nombrePh} className="field" />
                    </div>
                    <div className="form-field">
                      <label className="field-label">{f.correo}</label>
                      <input name="correo" type="email" required placeholder={f.correoPh} className="field" />
                    </div>
                    <div className="form-field">
                      <label className="field-label">{f.empresa}</label>
                      <input name="empresa" placeholder={f.empresaPh} className="field" />
                    </div>
                    <div className="form-field">
                      <label className="field-label">{f.mensaje}</label>
                      <textarea name="mensaje" required rows="4" placeholder={f.mensajePh} className="field"></textarea>
                    </div>
                    <button type="submit" className="btn btn-green form-submit">
                      <Ico id="i-arrow"/>{f.submit}
                    </button>
                  </form>
                )}
              </div>
            </div>
          </div>
        </section>
      );
    };

    /* ----------------------- FOOTER ----------------------- */
    const Footer = ({ t }) => (
      <footer className="site-footer">
        <span>{t.footer.copy}</span>
        <a href={`mailto:${CONFIG.email}`}>{CONFIG.email}</a>
      </footer>
    );

    /* ----------------------- FLOATING WA ----------------------- */
    const FloatingWA = ({ t }) => (
      <a href={waLink(t.waMsg)} target="_blank" aria-label="WhatsApp" className="floating-wa">
        <Ico id="i-wa" w={22} h={22}/>
        <span className="floating-wa-text">WhatsApp</span>
      </a>
    );

    /* ----------------------- APP ----------------------- */
    const App = () => {
      const [lang, setLang] = useState(detectLanguage);
      const t = TRANSLATIONS[lang];

      const setLanguage = (l) => {
        setLang(l);
        localStorage.setItem('orkesta-lang', l);
        const url = new URL(window.location.href);
        url.searchParams.set('lang', l);
        window.history.replaceState({}, '', url.toString());
        document.documentElement.lang = l;
        document.title = l === 'en'
          ? 'Orkesta — Automation & AI for your business'
          : 'Orkesta — Automatización e IA para tu negocio';
        const metaDesc = document.querySelector('meta[name="description"]');
        if (metaDesc) metaDesc.content = l === 'en'
          ? 'AI and automation consulting with n8n, Claude and custom integrations. From discovery to production, without friction.'
          : 'Consultoría en automatización con n8n, IA con Claude e integraciones a medida. Del discovery a producción, sin fricción. CDMX · México · LATAM.';
      };

      return (
        <div>
          <Nav lang={lang} setLanguage={setLanguage} t={t} />
          <main>
            <Hero t={t} />
            <Servicios t={t} />
            <Proceso t={t} />
            <Soluciones t={t} />
            <Precios t={t} />
            <Contacto t={t} />
          </main>
          <Footer t={t} />
          <FloatingWA t={t} />
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
